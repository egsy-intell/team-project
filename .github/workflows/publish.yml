name: Publish notebooks

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    name: Export notebooks & publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Export notebooks to HTML
        run: uv run python scripts/export_notebooks.py

      - name: Publish docs/notebooks/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/notebooks
          destination_dir: docs/notebooks
          publish_branch: gh-pages
